    <!--Tulisan Bergerak-->
<script>
const text = "Hi Welcome! Let's Get to Know Me ♡"; 
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 100);
    } else {
        setTimeout(() => {
            document.getElementById("typing").innerHTML = "";
            i = 0;
            typeWriter();
        }, 2000); // tunggu 2 saat sebelum ulang
    }
}


typeWriter();

</script>
